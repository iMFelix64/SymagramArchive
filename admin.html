<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SymagramArchive Admin</title>
    <style>
      :root {
        --bg: #f4f3ee;
        --ink: #141414;
        --muted: #66645d;
        --line: #cbc7bb;
        --line-strong: #141414;
        --panel: #fffefa;
        --panel-alt: #ebe8dc;
        --accent: #f2d331;
        --danger: #c83d25;
        --shadow: 0 18px 50px rgba(20, 20, 20, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          linear-gradient(rgba(20, 20, 20, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20, 20, 20, 0.025) 1px, transparent 1px),
          var(--bg);
        background-size: 28px 28px;
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        justify-content: center;
        min-height: 30px;
        padding: 5px 10px;
      }

      button:hover {
        background: var(--accent);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      input,
      textarea {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 0;
        color: var(--ink);
        min-height: 34px;
        padding: 7px 9px;
        width: 100%;
      }

      textarea {
        line-height: 1.45;
        resize: vertical;
      }

      .admin-shell {
        min-height: 100vh;
      }

      .admin-header {
        align-items: end;
        background: rgba(244, 243, 238, 0.92);
        border-bottom: 1px solid var(--line-strong);
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 18px 20px 14px;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .admin-kicker {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0 0 6px;
        text-transform: uppercase;
      }

      .admin-title {
        font-size: clamp(28px, 4vw, 48px);
        letter-spacing: -0.03em;
        line-height: 0.92;
        margin: 0;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .admin-action--primary {
        background: var(--ink);
        color: var(--panel);
      }

      .admin-action--primary:hover {
        background: var(--accent);
        color: var(--ink);
      }

      .admin-main {
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(280px, 0.82fr) minmax(360px, 1fr) minmax(360px, 1.1fr);
        padding: 14px 20px 24px;
      }

      .admin-panel {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        box-shadow: var(--shadow);
        min-width: 0;
      }

      .panel-header {
        align-items: start;
        border-bottom: 1px solid var(--line-strong);
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 12px;
      }

      .panel-title {
        font-size: 17px;
        line-height: 1.1;
        margin: 0;
      }

      .panel-note,
      .empty-note,
      .status-text {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        margin: 5px 0 0;
      }

      .panel-body {
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      .manager-stats {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .stat-box {
        background: var(--panel-alt);
        border: 1px solid var(--line);
        min-height: 62px;
        padding: 9px;
      }

      .stat-value {
        display: block;
        font-size: 24px;
        font-weight: 700;
        line-height: 1;
      }

      .stat-label {
        color: var(--muted);
        display: block;
        font-size: 11px;
        margin-top: 6px;
        text-transform: uppercase;
      }

      .group-stack {
        display: grid;
        gap: 10px;
      }

      .group-card {
        background: #fff;
        border: 1px solid var(--line);
      }

      .group-card.is-drag-over {
        border-color: var(--line-strong);
        box-shadow: inset 0 0 0 3px rgba(242, 211, 49, 0.5);
      }

      .group-top {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 8px;
      }

      .group-name-input {
        border-color: transparent;
        font-size: 18px;
        font-weight: 700;
        min-height: 30px;
        padding: 4px 6px;
      }

      .group-name-input:focus {
        border-color: var(--line-strong);
        outline: none;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mini-button {
        font-size: 12px;
        min-height: 28px;
        padding: 4px 8px;
      }

      .danger-button:hover {
        background: var(--danger);
        color: #fff;
      }

      .project-list {
        display: grid;
        gap: 6px;
        list-style: none;
        margin: 0;
        min-height: 54px;
        padding: 8px;
      }

      .project-item {
        align-items: center;
        background: #fdfcf8;
        border: 1px solid var(--line);
        cursor: grab;
        display: grid;
        gap: 8px;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        min-height: 48px;
        padding: 7px;
      }

      .project-item:hover,
      .project-item.is-selected {
        background: var(--accent);
        border-color: var(--line-strong);
      }

      .project-item.is-hidden {
        opacity: 0.48;
      }

      .project-number {
        font-size: 18px;
        font-weight: 700;
      }

      .project-copy {
        min-width: 0;
      }

      .project-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-meta {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.3;
        margin-top: 3px;
      }

      .project-quick {
        display: flex;
        gap: 4px;
      }

      .field-grid {
        display: grid;
        gap: 10px;
      }

      .field-row {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .section-rule {
        align-items: center;
        color: var(--ink);
        display: grid;
        font-size: 12px;
        font-weight: 700;
        gap: 9px;
        grid-template-columns: auto 1fr;
        letter-spacing: 0.06em;
        margin-top: 2px;
        text-transform: uppercase;
      }

      .section-rule::after {
        background: var(--line);
        content: "";
        height: 1px;
      }

      .check-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .check-label {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 12px;
        gap: 7px;
      }

      .check-label input {
        min-height: auto;
        width: auto;
      }

      .image-toolbar {
        display: grid;
        gap: 8px;
      }

      .image-actions {
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .image-list {
        display: grid;
        gap: 8px;
      }

      .image-row {
        background: #fff;
        border: 1px solid var(--line);
        display: grid;
        gap: 8px;
        grid-template-columns: 78px minmax(0, 1fr);
        padding: 8px;
      }

      .image-row.is-cover {
        border-color: var(--line-strong);
        box-shadow: inset 0 0 0 3px rgba(242, 211, 49, 0.45);
      }

      .image-thumb {
        background: var(--panel-alt);
        border: 1px solid var(--line);
        height: 74px;
        object-fit: cover;
        width: 74px;
      }

      .image-fields {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .image-path {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .image-row-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .paste-area {
        min-height: 98px;
        white-space: pre;
      }

      .export-output {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        min-height: 260px;
        white-space: pre;
      }

      .status-text.is-active {
        color: var(--ink);
        font-weight: 700;
      }

      @media (max-width: 1160px) {
        .admin-main {
          grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1fr);
        }

        .media-panel {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .admin-header,
        .admin-main {
          grid-template-columns: 1fr;
        }

        .admin-actions {
          justify-content: start;
        }

        .field-row,
        .image-actions,
        .manager-stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-kicker">SymagramArchive / Archive Data Manager</p>
          <h1 class="admin-title">Archive 管理台</h1>
        </div>
        <div class="admin-actions">
          <button id="add-group-button" type="button">Add Group</button>
          <button id="add-project-button" type="button">Add Project</button>
          <button id="reset-button" type="button">Reset</button>
          <button id="copy-button" type="button">Copy</button>
          <button class="admin-action--primary" id="save-button" type="button">Save Export</button>
        </div>
      </header>

      <section class="admin-main">
        <section class="admin-panel" aria-label="分组与项目排序">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">Groups & Order</h2>
              <p class="panel-note">分组可上下移动，项目可拖入不同分组，也可用 Up / Down 微调。</p>
            </div>
          </header>
          <div class="panel-body">
            <div class="manager-stats" id="manager-stats"></div>
            <div class="group-stack" id="group-stack"></div>
          </div>
        </section>

        <section class="admin-panel" aria-label="项目文字内容">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">Project Text</h2>
              <p class="panel-note">编辑单个项目的标题、描述和侧边栏文字；编号 ID 保持稳定。</p>
            </div>
          </header>
          <div class="panel-body" id="project-editor"></div>
        </section>

        <section class="admin-panel media-panel" aria-label="项目图片与来源">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">Images & Sources</h2>
              <p class="panel-note">调整图片顺序、封面、文件路径和来源备注。第一张会默认作为详情页主图。</p>
            </div>
          </header>
          <div class="panel-body">
            <div id="media-editor"></div>
            <div class="section-rule">Export</div>
            <p class="status-text" id="export-status" aria-live="polite"></p>
            <textarea class="export-output" id="export-output" spellcheck="false"></textarea>
          </div>
        </section>
      </section>
    </main>

    <script src="./archive-data.js?v=20260525-admin-manager-2"></script>
    <script>
      const sourceData = window.TDG_ARCHIVE || { groups: [], projects: [] };
      let draftData = cloneArchiveData(sourceData);
      let selectedProjectId = getFirstProjectId(draftData);
      let draggedProjectId = "";
      let exportStatusTimer = 0;

      const groupStack = document.getElementById("group-stack");
      const managerStats = document.getElementById("manager-stats");
      const projectEditor = document.getElementById("project-editor");
      const mediaEditor = document.getElementById("media-editor");
      const exportOutput = document.getElementById("export-output");
      const exportStatus = document.getElementById("export-status");
      const addGroupButton = document.getElementById("add-group-button");
      const addProjectButton = document.getElementById("add-project-button");
      const resetButton = document.getElementById("reset-button");
      const copyButton = document.getElementById("copy-button");
      const saveButton = document.getElementById("save-button");

      function cloneArchiveData(data) {
        const projects = (data.projects || []).map((project) => ({
          ...project,
          imageFolder: normalizeFolderPath(project.imageFolder || getCommonImageFolder(project.images || [])),
          images: normalizePathList(project.images || []),
          imageSources: { ...(project.imageSources || {}) },
        }));
        const projectIds = new Set(projects.map((project) => project.id));
        const groups = (data.groups || []).map((group) => ({
          ...group,
          id: group.id || createSlug(group.title || "group"),
          title: group.title || "Untitled",
          projectIds: [...new Set(group.projectIds || [])].filter((id) => projectIds.has(id)),
        }));
        const groupedIds = new Set(groups.flatMap((group) => group.projectIds));
        const orphanIds = projects.map((project) => project.id).filter((id) => !groupedIds.has(id));

        if (orphanIds.length) {
          groups.push({
            id: createUniqueGroupId(groups, "ungrouped"),
            title: "未分组",
            projectIds: orphanIds,
          });
        }

        return { groups, projects };
      }

      function createSlug(value) {
        return String(value || "group")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "") || "group";
      }

      function normalizeFolderPath(path) {
        return String(path || "").trim().replace(/\/+$/, "");
      }

      function normalizePathList(value) {
        if (Array.isArray(value)) {
          return value.map((path) => String(path || "").trim()).filter(Boolean);
        }

        return String(value || "")
          .split(/\r?\n/)
          .map((path) => path.trim())
          .filter(Boolean);
      }

      function getCommonImageFolder(images) {
        const firstImage = normalizePathList(images).find(Boolean);

        if (!firstImage) {
          return "";
        }

        const slashIndex = firstImage.lastIndexOf("/");
        return slashIndex >= 0 ? firstImage.slice(0, slashIndex) : "";
      }

      function isImagePath(path) {
        return /\.(avif|gif|jpe?g|png|webp)$/i.test(path);
      }

      function getFirstProjectId(data) {
        return (data.groups || []).find((group) => group.projectIds.length)?.projectIds[0]
          || data.projects?.[0]?.id
          || "";
      }

      function getProject(projectId = selectedProjectId) {
        return draftData.projects.find((project) => project.id === projectId) || null;
      }

      function getGroup(groupId) {
        return draftData.groups.find((group) => group.id === groupId) || null;
      }

      function getProjectGroup(projectId) {
        return draftData.groups.find((group) => group.projectIds.includes(projectId)) || null;
      }

      function getOrderedProjectIds() {
        return draftData.groups.flatMap((group) => group.projectIds);
      }

      function getDisplayNumber(projectId) {
        const index = getOrderedProjectIds().indexOf(projectId);
        return index >= 0 ? String(index + 1).padStart(2, "0") : projectId;
      }

      function createUniqueGroupId(groups, title) {
        const existingIds = new Set(groups.map((group) => group.id));
        const baseId = createSlug(title);
        let nextId = baseId;
        let suffix = 2;

        while (existingIds.has(nextId)) {
          nextId = `${baseId}-${suffix}`;
          suffix += 1;
        }

        return nextId;
      }

      function createProjectId() {
        const numericIds = draftData.projects
          .map((project) => Number(project.id))
          .filter((id) => Number.isFinite(id));

        return String(Math.max(0, ...numericIds) + 1).padStart(2, "0");
      }

      function selectProject(projectId) {
        if (!getProject(projectId)) {
          return;
        }

        selectedProjectId = projectId;
        renderAdmin();
      }

      function moveGroup(groupId, direction) {
        const index = draftData.groups.findIndex((group) => group.id === groupId);
        const nextIndex = index + direction;

        if (index < 0 || nextIndex < 0 || nextIndex >= draftData.groups.length) {
          return;
        }

        const [group] = draftData.groups.splice(index, 1);
        draftData.groups.splice(nextIndex, 0, group);
        renderAdmin();
      }

      function addGroup() {
        const title = window.prompt("输入新分组名称", "新分组");

        if (title === null || !title.trim()) {
          return;
        }

        draftData.groups.push({
          id: createUniqueGroupId(draftData.groups, title),
          title: title.trim(),
          projectIds: [],
        });
        renderAdmin();
      }

      function deleteGroup(groupId) {
        const group = getGroup(groupId);

        if (!group) {
          return;
        }

        if (group.projectIds.length) {
          const shouldContinue = window.confirm(`删除分组「${group.title}」并删除其中 ${group.projectIds.length} 个项目？`);

          if (!shouldContinue) {
            return;
          }
        }

        const deletedIds = new Set(group.projectIds);
        draftData.groups = draftData.groups.filter((currentGroup) => currentGroup.id !== groupId);
        draftData.projects = draftData.projects.filter((project) => !deletedIds.has(project.id));

        if (deletedIds.has(selectedProjectId)) {
          selectedProjectId = getFirstProjectId(draftData);
        }

        renderAdmin();
      }

      function addProject(groupId = draftData.groups[0]?.id) {
        let targetGroup = getGroup(groupId);

        if (!targetGroup) {
          draftData.groups.push({
            id: createUniqueGroupId(draftData.groups, "product"),
            title: "产品",
            projectIds: [],
          });
          targetGroup = draftData.groups[draftData.groups.length - 1];
        }

        const projectId = createProjectId();
        const project = {
          id: projectId,
          archiveCode: "",
          title: "新项目",
          year: "TBD",
          category: "",
          tagline: "Project / Direction",
          description: "这里填写项目介绍。",
          visible: true,
          placeholder: true,
          imageFolder: "",
          coverImage: "",
          images: [],
          imageSources: {},
        };

        draftData.projects.push(project);
        targetGroup.projectIds.push(projectId);
        selectedProjectId = projectId;
        renderAdmin();
      }

      function deleteProject(projectId) {
        const project = getProject(projectId);

        if (!project) {
          return;
        }

        const shouldDelete = window.confirm(`删除项目「${project.title}」？`);

        if (!shouldDelete) {
          return;
        }

        draftData.projects = draftData.projects.filter((currentProject) => currentProject.id !== projectId);
        draftData.groups.forEach((group) => {
          group.projectIds = group.projectIds.filter((id) => id !== projectId);
        });

        if (selectedProjectId === projectId) {
          selectedProjectId = getFirstProjectId(draftData);
        }

        renderAdmin();
      }

      function moveProject(projectId, direction) {
        const group = getProjectGroup(projectId);

        if (!group) {
          return;
        }

        const index = group.projectIds.indexOf(projectId);
        const nextIndex = index + direction;

        if (index < 0 || nextIndex < 0 || nextIndex >= group.projectIds.length) {
          return;
        }

        group.projectIds.splice(index, 1);
        group.projectIds.splice(nextIndex, 0, projectId);
        renderAdmin();
      }

      function moveProjectToGroup(projectId, targetGroupId, beforeProjectId = "") {
        const targetGroup = getGroup(targetGroupId);

        if (!targetGroup || !getProject(projectId)) {
          return;
        }

        draftData.groups.forEach((group) => {
          group.projectIds = group.projectIds.filter((id) => id !== projectId);
        });

        const beforeIndex = beforeProjectId ? targetGroup.projectIds.indexOf(beforeProjectId) : -1;

        if (beforeIndex >= 0) {
          targetGroup.projectIds.splice(beforeIndex, 0, projectId);
        } else {
          targetGroup.projectIds.push(projectId);
        }

        selectedProjectId = projectId;
        renderAdmin();
      }

      function moveImage(project, index, direction) {
        const nextIndex = index + direction;

        if (nextIndex < 0 || nextIndex >= project.images.length) {
          return;
        }

        [project.images[index], project.images[nextIndex]] = [project.images[nextIndex], project.images[index]];
        syncProjectMedia(project);
        renderAdmin();
      }

      function deleteImage(project, index) {
        const [path] = project.images.splice(index, 1);

        if (project.imageSources) {
          delete project.imageSources[path];
        }

        syncProjectMedia(project);
        renderAdmin();
      }

      function setImagePath(project, index, nextPath) {
        const oldPath = project.images[index];
        const cleanPath = String(nextPath || "").trim();

        if (!cleanPath) {
          deleteImage(project, index);
          return;
        }

        project.images[index] = cleanPath;

        if (project.imageSources?.[oldPath] && oldPath !== cleanPath) {
          project.imageSources[cleanPath] = project.imageSources[oldPath];
          delete project.imageSources[oldPath];
        }

        syncProjectMedia(project);
        renderAdmin();
      }

      function setImageSource(project, path, source) {
        project.imageSources = project.imageSources || {};

        if (source.trim()) {
          project.imageSources[path] = source.trim();
        } else {
          delete project.imageSources[path];
        }

        exportArchiveData();
      }

      function syncProjectMedia(project) {
        project.images = normalizePathList(project.images);
        project.imageFolder = normalizeFolderPath(project.imageFolder || getCommonImageFolder(project.images));
        project.coverImage = project.images[0] || "";
      }

      function addImagePath(project, path) {
        const cleanPath = String(path || "").trim();

        if (!cleanPath) {
          return;
        }

        project.images.push(cleanPath);
        syncProjectMedia(project);
        renderAdmin();
      }

      function replaceImagesFromText(project, text) {
        const images = normalizePathList(text);

        project.images = images;
        project.coverImage = images[0] || "";
        project.imageFolder = project.imageFolder || getCommonImageFolder(images);
        renderAdmin();
      }

      function getImageFolderBase(project) {
        const currentFolder = normalizeFolderPath(project.imageFolder);
        const slashIndex = currentFolder.lastIndexOf("/");

        if (slashIndex > 0) {
          return currentFolder.slice(0, slashIndex);
        }

        return "./Assets/Project Vault";
      }

      function createSelectedFolderPath(project, folderName) {
        return `${getImageFolderBase(project)}/${folderName}`.replace(/\/+/g, "/").replace(/^\.\//, "./");
      }

      function applySelectedFolder(project, folderName, imageNames) {
        const imageFolder = createSelectedFolderPath(project, folderName);
        const sortedImageNames = [...imageNames]
          .filter((name) => isImagePath(name))
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        project.imageFolder = imageFolder;
        project.images = sortedImageNames.map((name) => `${imageFolder}/${name}`);
        project.coverImage = project.images[0] || "";
        showStatus(`Selected ${folderName} / ${project.images.length} images.`);
        renderAdmin();
      }

      function getFolderIndexUrl(folderPath) {
        const imageFolder = normalizeFolderPath(folderPath);
        return imageFolder ? new URL(`${imageFolder}/`, window.location.href) : null;
      }

      async function readImagesFromFolder(folderPath) {
        const imageFolder = normalizeFolderPath(folderPath);
        const folderUrl = getFolderIndexUrl(imageFolder);

        if (!folderUrl) {
          return [];
        }

        const response = await fetch(folderUrl.href, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Cannot read folder: ${imageFolder}`);
        }

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const imageNames = Array.from(doc.querySelectorAll("a[href]"))
          .map((link) => decodeURIComponent(link.getAttribute("href") || ""))
          .map((href) => href.split(/[?#]/)[0].replace(/^\.?\//, ""))
          .filter((href) => href && !href.includes("/") && isImagePath(href))
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        return imageNames.map((name) => `${imageFolder}/${name}`);
      }

      async function refreshImagesFromFolder(project) {
        const images = await readImagesFromFolder(project.imageFolder);

        project.images = images;
        project.coverImage = images[0] || "";
        showStatus(`Loaded ${images.length} images.`);
        renderAdmin();
      }

      async function chooseImageFolder(project) {
        if ("showDirectoryPicker" in window) {
          try {
            const directoryHandle = await window.showDirectoryPicker({ mode: "read" });
            const imageNames = [];

            for await (const [name, handle] of directoryHandle.entries()) {
              if (handle.kind === "file" && isImagePath(name)) {
                imageNames.push(name);
              }
            }

            applySelectedFolder(project, directoryHandle.name, imageNames);
          } catch (error) {
            if (error.name !== "AbortError") {
              showStatus("Folder picker failed. Use the path field instead.");
            }
          }
          return;
        }

        openFallbackFolderInput(project);
      }

      function openFallbackFolderInput(project) {
        const input = document.createElement("input");

        input.type = "file";
        input.accept = "image/*";
        input.multiple = true;
        input.webkitdirectory = true;
        input.style.position = "fixed";
        input.style.left = "-9999px";
        input.addEventListener("change", () => {
          const files = Array.from(input.files || []);
          const firstPath = files[0]?.webkitRelativePath || files[0]?.name || "";
          const folderName = firstPath.split("/")[0] || "Selected Folder";
          const imageNames = files
            .map((file) => file.webkitRelativePath?.split("/").slice(1).join("/") || file.name)
            .filter(Boolean);

          applySelectedFolder(project, folderName, imageNames);
          input.remove();
        });
        document.body.append(input);
        input.click();
      }

      function createField(labelText, value, onInput, options = {}) {
        const field = document.createElement("label");
        const label = document.createElement("span");
        const input = document.createElement(options.multiline ? "textarea" : "input");

        field.className = "field";
        label.className = "field-label";
        label.textContent = labelText;
        input.value = value || "";

        if (options.multiline) {
          input.style.minHeight = options.minHeight || "88px";
        } else {
          input.type = "text";
        }

        input.addEventListener("input", () => {
          onInput(input.value);
          exportArchiveData();
        });

        field.append(label, input);
        return field;
      }

      function createCheckbox(labelText, checked, onChange) {
        const label = document.createElement("label");
        const input = document.createElement("input");

        label.className = "check-label";
        input.type = "checkbox";
        input.checked = checked;
        input.addEventListener("change", () => {
          onChange(input.checked);
          renderAdmin();
        });
        label.append(input, labelText);
        return label;
      }

      function createButton(text, onClick, className = "mini-button") {
        const button = document.createElement("button");

        button.className = className;
        button.type = "button";
        button.textContent = text;
        button.addEventListener("click", onClick);
        return button;
      }

      function createSectionRule(text) {
        const title = document.createElement("div");

        title.className = "section-rule";
        title.textContent = text;
        return title;
      }

      function renderStats() {
        const visibleCount = draftData.projects.filter((project) => project.visible !== false).length;
        const imageCount = draftData.projects.reduce((total, project) => total + (project.images || []).length, 0);
        const stats = [
          ["Groups", draftData.groups.length],
          ["Projects", visibleCount],
          ["Images", imageCount],
        ].map(([label, value]) => {
          const box = document.createElement("div");
          const valueEl = document.createElement("span");
          const labelEl = document.createElement("span");

          box.className = "stat-box";
          valueEl.className = "stat-value";
          valueEl.textContent = value;
          labelEl.className = "stat-label";
          labelEl.textContent = label;
          box.append(valueEl, labelEl);
          return box;
        });

        managerStats.replaceChildren(...stats);
      }

      function renderGroups() {
        groupStack.replaceChildren(...draftData.groups.map((group, groupIndex) => {
          const card = document.createElement("section");
          const top = document.createElement("div");
          const name = document.createElement("input");
          const tools = document.createElement("div");
          const list = document.createElement("ol");

          card.className = "group-card";
          card.dataset.groupId = group.id;
          card.addEventListener("dragover", (event) => {
            event.preventDefault();
            card.classList.add("is-drag-over");
          });
          card.addEventListener("dragleave", () => {
            card.classList.remove("is-drag-over");
          });
          card.addEventListener("drop", (event) => {
            event.preventDefault();
            card.classList.remove("is-drag-over");
            moveProjectToGroup(draggedProjectId, group.id);
          });

          top.className = "group-top";
          name.className = "group-name-input";
          name.value = group.title;
          name.setAttribute("aria-label", "Group title");
          name.addEventListener("input", () => {
            group.title = name.value;
            exportArchiveData();
          });

          tools.className = "button-row";
          tools.append(
            createButton("Up", () => moveGroup(group.id, -1)),
            createButton("Down", () => moveGroup(group.id, 1)),
            createButton("Add", () => addProject(group.id)),
            createButton("Delete", () => deleteGroup(group.id), "mini-button danger-button"),
          );
          tools.children[0].disabled = groupIndex === 0;
          tools.children[1].disabled = groupIndex === draftData.groups.length - 1;

          list.className = "project-list";
          list.dataset.groupId = group.id;

          group.projectIds.forEach((projectId) => {
            const project = getProject(projectId);

            if (project) {
              list.append(createProjectItem(project));
            }
          });

          top.append(name, tools);
          card.append(top, list);
          return card;
        }));
      }

      function createProjectItem(project) {
        const item = document.createElement("li");
        const number = document.createElement("span");
        const copy = document.createElement("div");
        const title = document.createElement("div");
        const meta = document.createElement("div");
        const tools = document.createElement("div");

        item.className = "project-item";
        item.classList.toggle("is-selected", project.id === selectedProjectId);
        item.classList.toggle("is-hidden", project.visible === false);
        item.draggable = true;
        item.dataset.projectId = project.id;
        item.addEventListener("click", () => selectProject(project.id));
        item.addEventListener("dragstart", (event) => {
          draggedProjectId = project.id;
          event.dataTransfer?.setData("text/plain", project.id);
          event.dataTransfer?.setDragImage(item, 18, 18);
        });
        item.addEventListener("dragend", () => {
          draggedProjectId = "";
        });
        item.addEventListener("dragover", (event) => {
          event.preventDefault();
        });
        item.addEventListener("drop", (event) => {
          const targetGroup = event.currentTarget.closest(".group-card")?.dataset.groupId;

          event.preventDefault();
          event.stopPropagation();
          moveProjectToGroup(draggedProjectId, targetGroup, project.id);
        });

        number.className = "project-number";
        number.textContent = `${getDisplayNumber(project.id)}.`;

        copy.className = "project-copy";
        title.className = "project-title";
        title.textContent = project.title || "Untitled";
        meta.className = "project-meta";
        meta.textContent = [
          project.archiveCode || project.year || "TBD",
          project.category || project.tagline || "No category",
          `${(project.images || []).length} img`,
        ].join(" / ");
        copy.append(title, meta);

        tools.className = "project-quick";
        tools.append(
          createButton("Up", (event) => {
            event.stopPropagation();
            moveProject(project.id, -1);
          }),
          createButton("Down", (event) => {
            event.stopPropagation();
            moveProject(project.id, 1);
          }),
        );

        item.append(number, copy, tools);
        return item;
      }

      function renderProjectEditor() {
        const project = getProject();

        if (!project) {
          projectEditor.replaceChildren(createEmptyNote("还没有项目。先创建分组和项目。"));
          return;
        }

        const grid = document.createElement("div");
        const rowOne = document.createElement("div");
        const rowTwo = document.createElement("div");
        const checks = document.createElement("div");
        const footer = document.createElement("div");

        grid.className = "field-grid";
        rowOne.className = "field-row";
        rowTwo.className = "field-row";
        checks.className = "check-row";
        footer.className = "button-row";

        rowOne.append(
          createField("Stable ID", project.id, (value) => {
            const nextId = value.trim();

            if (!nextId || nextId === project.id || getProject(nextId)) {
              return;
            }

            draftData.groups.forEach((group) => {
              group.projectIds = group.projectIds.map((id) => id === project.id ? nextId : id);
            });
            project.id = nextId;
            selectedProjectId = nextId;
          }),
          createField("Archive Code", project.archiveCode || "", (value) => {
            project.archiveCode = value;
          }),
        );

        rowTwo.append(
          createField("Year", project.year || "", (value) => {
            project.year = value;
          }),
          createField("Category", project.category || "", (value) => {
            project.category = value;
          }),
        );

        checks.append(
          createCheckbox("Visible", project.visible !== false, (checked) => {
            project.visible = checked;
          }),
          createCheckbox("Placeholder", project.placeholder === true, (checked) => {
            project.placeholder = checked;
          }),
        );

        footer.append(
          createButton("Duplicate Project", () => duplicateProject(project.id)),
          createButton("Delete Project", () => deleteProject(project.id), "mini-button danger-button"),
        );

        grid.append(
          createEmptyNote(`当前排序 ${getDisplayNumber(project.id)} / 所在分组 ${getProjectGroup(project.id)?.title || "未分组"}`),
          createSectionRule("Identity"),
          rowOne,
          rowTwo,
          checks,
          createSectionRule("Main Copy"),
          createField("Title", project.title || "", (value) => {
            project.title = value;
          }),
          createField("Tagline", project.tagline || "", (value) => {
            project.tagline = value;
          }),
          createField("Description", project.description || "", (value) => {
            project.description = value;
          }, { multiline: true, minHeight: "116px" }),
          createSectionRule("Panel Detail Copy"),
          createField("Side Title", project.sideTitle || "", (value) => {
            project.sideTitle = value;
          }),
          createField("Side Description", project.sideDescription || "", (value) => {
            project.sideDescription = value;
          }, { multiline: true }),
          createField("Direction", project.direction || "", (value) => {
            project.direction = value;
          }),
          createField("Keywords", project.keywords || "", (value) => {
            project.keywords = value;
          }),
          footer,
        );

        projectEditor.replaceChildren(grid);
      }

      function duplicateProject(projectId) {
        const sourceProject = getProject(projectId);
        const group = getProjectGroup(projectId);

        if (!sourceProject || !group) {
          return;
        }

        const newId = createProjectId();
        const newProject = {
          ...JSON.parse(JSON.stringify(sourceProject)),
          id: newId,
          title: `${sourceProject.title || "项目"} Copy`,
        };
        const sourceIndex = group.projectIds.indexOf(projectId);

        draftData.projects.push(newProject);
        group.projectIds.splice(sourceIndex + 1, 0, newId);
        selectedProjectId = newId;
        renderAdmin();
      }

      function renderMediaEditor() {
        const project = getProject();

        if (!project) {
          mediaEditor.replaceChildren(createEmptyNote("选择一个项目后管理图片。"));
          return;
        }

        syncProjectMedia(project);

        const shell = document.createElement("div");
        const folderActions = document.createElement("div");
        const addActions = document.createElement("div");
        const pasteField = document.createElement("label");
        const pasteLabel = document.createElement("span");
        const pasteArea = document.createElement("textarea");
        const imageList = document.createElement("div");

        shell.className = "image-toolbar";
        folderActions.className = "image-actions";
        addActions.className = "image-actions";
        imageList.className = "image-list";
        pasteField.className = "field";
        pasteLabel.className = "field-label";
        pasteLabel.textContent = "Bulk Paths";
        pasteArea.className = "paste-area";
        pasteArea.spellcheck = false;
        pasteArea.value = (project.images || []).join("\n");
        pasteArea.addEventListener("change", () => {
          replaceImagesFromText(project, pasteArea.value);
        });
        pasteField.append(pasteLabel, pasteArea);

        const newPathInput = document.createElement("input");
        newPathInput.placeholder = "./Assets/Project Vault/.../image.jpg";
        newPathInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            addImagePath(project, newPathInput.value);
            newPathInput.value = "";
          }
        });

        const folderButtons = document.createElement("div");

        folderButtons.className = "button-row";
        folderButtons.append(
          createButton("Choose Folder", () => {
            chooseImageFolder(project);
          }),
          createButton("Refresh Folder", async () => {
            try {
              await refreshImagesFromFolder(project);
            } catch (error) {
              showStatus("Folder read failed. Start a local server, then retry.");
            }
          }),
        );

        folderActions.append(
          createField("Image Folder", project.imageFolder || "", (value) => {
            project.imageFolder = normalizeFolderPath(value);
          }),
          folderButtons,
        );

        addActions.append(
          newPathInput,
          createButton("Add Image", () => {
            addImagePath(project, newPathInput.value);
            newPathInput.value = "";
          }),
        );

        if (project.images.length) {
          project.images.forEach((path, index) => {
            imageList.append(createImageRow(project, path, index));
          });
        } else {
          imageList.append(createEmptyNote("还没有图片。填写文件夹后刷新，或手动添加路径。"));
        }

        shell.append(
          folderActions,
          addActions,
          pasteField,
          createSectionRule(`Image Queue / ${project.images.length}`),
          imageList,
        );
        mediaEditor.replaceChildren(shell);
      }

      function createImageRow(project, path, index) {
        const row = document.createElement("article");
        const thumb = document.createElement("img");
        const fields = document.createElement("div");
        const pathInput = document.createElement("input");
        const sourceInput = document.createElement("input");
        const tools = document.createElement("div");

        row.className = "image-row";
        row.classList.toggle("is-cover", index === 0);

        thumb.className = "image-thumb";
        thumb.src = path;
        thumb.alt = "";
        thumb.loading = "lazy";

        fields.className = "image-fields";
        pathInput.className = "image-path";
        pathInput.value = path;
        pathInput.setAttribute("aria-label", `Image ${index + 1} path`);
        pathInput.addEventListener("change", () => {
          setImagePath(project, index, pathInput.value);
        });

        sourceInput.value = project.imageSources?.[path] || "";
        sourceInput.placeholder = "来源备注，例如 render / photo / Behance reference";
        sourceInput.setAttribute("aria-label", `Image ${index + 1} source`);
        sourceInput.addEventListener("input", () => {
          setImageSource(project, path, sourceInput.value);
        });

        tools.className = "image-row-tools";
        tools.append(
          createButton("Up", () => moveImage(project, index, -1)),
          createButton("Down", () => moveImage(project, index, 1)),
          createButton("Cover", () => moveImageToCover(project, index)),
          createButton("Delete", () => deleteImage(project, index), "mini-button danger-button"),
        );
        tools.children[0].disabled = index === 0;
        tools.children[1].disabled = index === project.images.length - 1;
        tools.children[2].disabled = index === 0;

        fields.append(pathInput, sourceInput, tools);
        row.append(thumb, fields);
        return row;
      }

      function moveImageToCover(project, index) {
        if (index <= 0) {
          return;
        }

        const [image] = project.images.splice(index, 1);
        project.images.unshift(image);
        syncProjectMedia(project);
        renderAdmin();
      }

      function createEmptyNote(text) {
        const note = document.createElement("p");

        note.className = "empty-note";
        note.textContent = text;
        return note;
      }

      function createExportData() {
        const orderedIds = getOrderedProjectIds();
        const groupedIds = new Set(orderedIds);
        const orderedProjects = orderedIds.map(getProject).filter(Boolean);
        const orphanProjects = draftData.projects.filter((project) => !groupedIds.has(project.id));

        return {
          groups: draftData.groups.map((group) => ({
            ...group,
            projectIds: [...group.projectIds],
          })),
          projects: [...orderedProjects, ...orphanProjects].map((project) => {
            const imageFolder = normalizeFolderPath(project.imageFolder);
            const images = normalizePathList(project.images);
            const imageSources = Object.fromEntries(
              Object.entries(project.imageSources || {})
                .filter(([path, source]) => images.includes(path) && String(source || "").trim())
                .map(([path, source]) => [path, String(source).trim()]),
            );
            const {
              imageFolder: _imageFolder,
              images: _images,
              coverImage: _coverImage,
              imageSources: _imageSources,
              ...projectData
            } = project;

            return {
              ...projectData,
              id: project.id,
              ...(imageFolder ? { imageFolder } : {}),
              ...(images.length ? { coverImage: images[0], images } : {}),
              ...(Object.keys(imageSources).length ? { imageSources } : {}),
            };
          }),
        };
      }

      function exportArchiveData() {
        exportOutput.value = `window.TDG_ARCHIVE = ${JSON.stringify(createExportData(), null, 2)};\n`;
      }

      async function saveExportFile() {
        exportArchiveData();

        if ("showSaveFilePicker" in window) {
          const fileHandle = await window.showSaveFilePicker({
            suggestedName: "archive-data.js",
            types: [
              {
                description: "JavaScript file",
                accept: {
                  "text/javascript": [".js"],
                },
              },
            ],
          });
          const writable = await fileHandle.createWritable();

          await writable.write(exportOutput.value);
          await writable.close();
          showStatus("Saved archive-data.js.");
          return;
        }

        const fileBlob = new Blob([exportOutput.value], { type: "text/javascript" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(fileBlob);
        link.download = "archive-data.js";
        document.body.append(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(link.href), 0);
        showStatus("Downloaded archive-data.js.");
      }

      async function copyExport() {
        exportArchiveData();
        exportOutput.select();

        try {
          await navigator.clipboard.writeText(exportOutput.value);
        } catch (error) {
          document.execCommand("copy");
        }

        showStatus("Copied export content.");
      }

      function showStatus(message) {
        window.clearTimeout(exportStatusTimer);
        exportStatus.textContent = message;
        exportStatus.classList.add("is-active");
        exportStatusTimer = window.setTimeout(() => {
          exportStatus.textContent = "";
          exportStatus.classList.remove("is-active");
        }, 1800);
      }

      function renderAdmin() {
        if (!selectedProjectId || !getProject(selectedProjectId)) {
          selectedProjectId = getFirstProjectId(draftData);
        }

        renderStats();
        renderGroups();
        renderProjectEditor();
        renderMediaEditor();
        exportArchiveData();
      }

      addGroupButton.addEventListener("click", addGroup);
      addProjectButton.addEventListener("click", () => addProject(getProjectGroup(selectedProjectId)?.id));
      resetButton.addEventListener("click", () => {
        draftData = cloneArchiveData(sourceData);
        selectedProjectId = getFirstProjectId(draftData);
        renderAdmin();
      });
      copyButton.addEventListener("click", copyExport);
      saveButton.addEventListener("click", async () => {
        try {
          await saveExportFile();
        } catch (error) {
          if (error.name !== "AbortError") {
            showStatus("Save failed. Copy the export content instead.");
          }
        }
      });

      renderAdmin();
    </script>
  </body>
</html>
