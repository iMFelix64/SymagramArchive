<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rolling Stream / Two Disk Garage</title>
    <link rel="stylesheet" href="./rolling-stream.css?v=less-bounce-1" />
  </head>
  <body>
    <div class="rolling-focus-line" id="rolling-focus-band" aria-hidden="true">
      <button class="rolling-focus-line-label" id="rolling-focus-band-handle" type="button">FOCUS BAND</button>
    </div>
    <div class="rolling-size-control" id="rolling-size-control" aria-label="调节 rolling 动画参数">
      <span class="rolling-size-label">SIZE</span>
      <input
        class="rolling-size-slider"
        id="rolling-size-slider"
        type="range"
        min="480"
        max="720"
        step="10"
        value="680"
      />
      <output class="rolling-size-value" id="rolling-size-value" for="rolling-size-slider">680</output>
      <span class="rolling-size-label">FOLLOW</span>
      <input
        class="rolling-size-slider"
        id="rolling-follow-slider"
        type="range"
        min="0.035"
        max="0.12"
        step="0.005"
        value="0.06"
      />
      <output class="rolling-size-value" id="rolling-follow-value" for="rolling-follow-slider">0.060</output>
      <span class="rolling-size-label">DELAY</span>
      <input
        class="rolling-size-slider"
        id="rolling-delay-slider"
        type="range"
        min="0"
        max="100"
        step="1"
        value="0"
      />
      <output class="rolling-size-value" id="rolling-delay-value" for="rolling-delay-slider">0</output>
    </div>
    <main class="rolling-app" aria-label="Two Disk Garage rolling stream" data-debug-label="main.rolling-app">
      <header class="rolling-topbar" aria-label="rolling stream 工具栏" data-debug-label="header.rolling-topbar">
        <div class="rolling-topbar-path" data-debug-label="div.rolling-topbar-path">
          <span>ARCHIVE /</span>
          <span class="rolling-topbar-active">ROLLING STREAM</span>
        </div>
        <div class="rolling-topbar-mode" data-debug-label="div.rolling-topbar-mode">
          <span>SPRING</span>
          <span>3:2</span>
          <button class="rolling-debug-toggle" id="debug-toggle" type="button" aria-pressed="false">OUTLINE</button>
          <button class="rolling-debug-toggle" id="label-toggle" type="button" aria-pressed="false">LABEL</button>
        </div>
      </header>

      <div class="rolling-divider" aria-hidden="true"></div>

      <section class="rolling-hero" data-debug-label="section.rolling-hero">
        <h1 class="rolling-title">产品</h1>
        <p class="rolling-intro">
          Project 01-04 的内容重新整理为一个独立的 rolling stream。每一张图都保持 3:2，
          并随着滚动产生带弹性的缩放反馈。
        </p>
      </section>

      <div class="rolling-divider" aria-hidden="true"></div>

      <section class="rolling-projects" aria-label="project rolling stream" data-debug-label="section.rolling-projects"></section>
    </main>

    <script src="./rolling-stream.js?v=less-bounce-1"></script>
  </body>
</html>
